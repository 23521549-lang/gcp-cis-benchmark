name: "WF2 — Scheduled CIS Monitor"

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      notify_on_pass:
        description: 'Send notification even when fully compliant'
        type: boolean
        default: false

env:
  PROJECT_ID:      project-3a51a40b-8c9e-4126-804
  SCRIPTS_DIR:     scripts
  REGION:          asia-southeast1
  TF_DIR:          terraform
  TF_STATE_BUCKET: tf-state-3a51a40b-8c9e-4126-804
  ALERT_EMAIL:     23521549@gm.uit.edu.vn

jobs:
  monitor:
    name: "CIS Continuous Compliance Check"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: "Phase 0 | Collect System Information"
        run: |
          echo "##[group]Phase 0: System Information Collection"
          chmod +x ${{ env.SCRIPTS_DIR }}/collect_info.sh
          REGION=${{ env.REGION }} \
            ${{ env.SCRIPTS_DIR }}/collect_info.sh /tmp || true
          echo "##[endgroup]"

      - name: "Baseline | Load from GCS"
        run: |
          echo "##[group]Baseline: Load from GCS"
          gsutil cp \
            gs://${{ env.TF_STATE_BUCKET }}/baseline/cis_baseline_latest.json \
            /tmp/cis_baseline_latest.json 2>/dev/null \
            && echo "OK       Baseline loaded from GCS" \
            && echo "BASELINE_LOADED=true"  >> $GITHUB_ENV \
            || { echo "##[warning]Baseline not found in GCS"; \
                 echo "BASELINE_LOADED=false" >> $GITHUB_ENV; }
          gsutil cp \
            gs://${{ env.TF_STATE_BUCKET }}/baseline/iam_baseline_latest.json \
            /tmp/iam_baseline_latest.json 2>/dev/null || true
          echo "##[endgroup]"

      - name: "Phase 2a | CIS Compliance Check (29 controls)"
        run: |
          echo "##[group]Phase 2a: CIS Compliance Check — 29 Controls, 6 Domains"
          chmod +x ${{ env.SCRIPTS_DIR }}/cis_full_check.sh
          cd ${{ env.SCRIPTS_DIR }}
          set +e
          ./cis_full_check.sh json /tmp/cis_report.json /tmp/cis_baseline_latest.json \
            2>&1 | tee /tmp/cis_output.txt
          CIS_EXIT=$?
          set -e
          echo "CIS_EXIT=$CIS_EXIT" >> $GITHUB_ENV
          if [ -f /tmp/cis_report.json ]; then
            echo "CIS_PASS=$(jq '.total_pass'      /tmp/cis_report.json)" >> $GITHUB_ENV
            echo "CIS_FAIL=$(jq '.total_fail'      /tmp/cis_report.json)" >> $GITHUB_ENV
            echo "CIS_RATE=$(jq '.compliance_rate' /tmp/cis_report.json)" >> $GITHUB_ENV
            RC=$(jq '.regression_controls | length' /tmp/cis_report.json 2>/dev/null || echo 0)
            [ "$RC" -gt 0 ] \
              && echo "REGRESSION=true"  >> $GITHUB_ENV \
              || echo "REGRESSION=false" >> $GITHUB_ENV
          else
            echo "CIS_PASS=0"      >> $GITHUB_ENV
            echo "CIS_FAIL=99"     >> $GITHUB_ENV
            echo "CIS_RATE=0"      >> $GITHUB_ENV
            echo "REGRESSION=true" >> $GITHUB_ENV
          fi
          echo "##[endgroup]"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: "Phase 2b | Terraform Drift Detection"
        run: |
          echo "##[group]Phase 2b: Terraform Drift Detection"
          cd ${{ env.TF_DIR }}
          terraform init -upgrade -input=false -no-color 2>/dev/null
          set +e
          terraform plan \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="allowed_client_cidr=${{ secrets.ALLOWED_CLIENT_CIDR }}" \
            -detailed-exitcode -input=false -no-color \
            2>&1 | tee /tmp/drift_check.txt
          DRIFT_EXIT=${PIPESTATUS[0]}
          set -e

          echo "DRIFT_EXIT=$DRIFT_EXIT" >> $GITHUB_ENV

          if [ "$DRIFT_EXIT" -eq 2 ]; then
            echo "DRIFT_DETECTED=true" >> $GITHUB_ENV
            DRIFT_COUNT=$(grep -cE "will be (created|updated|destroyed)|must be replaced|has been deleted" \
              /tmp/drift_check.txt 2>/dev/null || echo "0")
            echo "DRIFT_COUNT=$DRIFT_COUNT" >> $GITHUB_ENV
            echo "##[warning]Infrastructure drift detected — $DRIFT_COUNT resource(s) changed outside Terraform"
            grep -E "# .+ (will be|must be|has been)" /tmp/drift_check.txt | head -10 || true
          elif [ "$DRIFT_EXIT" -eq 0 ]; then
            echo "DRIFT_DETECTED=false" >> $GITHUB_ENV
            echo "DRIFT_COUNT=0"        >> $GITHUB_ENV
            echo "OK       No infrastructure drift detected"
          else
            echo "DRIFT_DETECTED=false" >> $GITHUB_ENV
            echo "DRIFT_COUNT=0"        >> $GITHUB_ENV
            echo "##[warning]Terraform plan error (exit: $DRIFT_EXIT)"
          fi
          echo "##[endgroup]"
        continue-on-error: true

      - name: "Phase 2c | IAM Anomaly Detection"
        run: |
          echo "##[group]Phase 2c: IAM Anomaly Detection"
          python3 ${{ env.SCRIPTS_DIR }}/python/iam_diff.py \
            && { echo "OK       IAM bindings unchanged from baseline"; \
                 echo "IAM_ANOMALY=false" >> $GITHUB_ENV; } \
            || { echo "##[warning]IAM anomaly detected — new bindings outside baseline"; \
                 echo "IAM_ANOMALY=true" >> $GITHUB_ENV; }
          echo "##[endgroup]"
        env:
          IAM_BASELINE: /tmp/iam_baseline_latest.json
          IAM_CURRENT:  /tmp/iam_snapshot.json
        continue-on-error: true

      - name: "Analysis | Evaluate Compliance Status"
        run: |
          echo "##[group]Analysis: Compliance Status Evaluation"
          ACTION="NONE"
          TRIGGER_REASON=""

          if [ "${{ env.DRIFT_DETECTED }}" = "true" ]; then
            ACTION="URGENT"
            TRIGGER_REASON="WF2_DRIFT"
          fi
          if [ "${{ env.IAM_ANOMALY }}" = "true" ]; then
            ACTION="URGENT"
            TRIGGER_REASON="${TRIGGER_REASON:+$TRIGGER_REASON,}WF2_IAM_ANOMALY"
          fi
          if [ "${{ env.REGRESSION }}" = "true" ]; then
            [ "$ACTION" = "NONE" ] && ACTION="RECOVERY"
            TRIGGER_REASON="${TRIGGER_REASON:+$TRIGGER_REASON,}CIS_REGRESSION:${{ env.CIS_FAIL }}"
          fi

          CIS_FAIL="${{ env.CIS_FAIL }}"
          if [ "${CIS_FAIL:-0}" -gt 0 ] && [ "$ACTION" = "NONE" ]; then
            ACTION="RECOVERY"
            TRIGGER_REASON="CIS_FAIL:${CIS_FAIL}"
          fi

          echo "ACTION=$ACTION"                >> $GITHUB_ENV
          echo "TRIGGER_REASON=$TRIGGER_REASON" >> $GITHUB_ENV
          echo "WF2_TF_FAILED=false"            >> $GITHUB_ENV
          echo "WF2_ERROR_TYPE=NONE"            >> $GITHUB_ENV

          echo "INFO     Compliance  : ${{ env.CIS_RATE }}%"
          echo "INFO     Controls    : ${{ env.CIS_PASS }} pass / ${{ env.CIS_FAIL }} fail"
          echo "INFO     Regression  : ${{ env.REGRESSION }}"
          echo "INFO     Drift       : ${{ env.DRIFT_DETECTED }}"
          echo "INFO     IAM Anomaly : ${{ env.IAM_ANOMALY }}"
          echo "INFO     Action      : $ACTION"
          echo "INFO     Reason      : ${TRIGGER_REASON:-none}"
          echo "##[endgroup]"

      - name: "History | Save Compliance Record"
        run: |
          echo "##[group]History: Save Compliance Record to GCS"
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          TIMESTAMP=$TIMESTAMP \
          TRIGGER=WF2_scheduled \
          DRIFT_DETECTED=${{ env.DRIFT_DETECTED }} \
          IAM_ANOMALY=${{ env.IAM_ANOMALY }} \
            python3 ${{ env.SCRIPTS_DIR }}/python/save_history.py || true

          gsutil cp /tmp/history_${TIMESTAMP}.json \
            gs://${{ env.TF_STATE_BUCKET }}/compliance_history/${TIMESTAMP}.json \
            2>/dev/null \
            && echo "OK       History saved: ${TIMESTAMP}.json" \
            || echo "##[warning]Failed to upload compliance history to GCS"
          echo "##[endgroup]"

      - name: "Artifacts | Upload Reports"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wf2-monitor-report-${{ github.run_number }}
          path: |
            /tmp/cis_report.json
            /tmp/context_info.json
            /tmp/drift_check.txt
          retention-days: 30

      - name: "WF4 | Trigger Recovery Pipeline"
        if: env.ACTION != 'NONE'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              workflow_id: 'wf4_recovery.yml',
              ref:         'main',
              inputs: {
                trigger:        `WF2_${process.env.ACTION}`,
                cis_fail_count: process.env.CIS_FAIL       || '0',
                tf_failed:      process.env.WF2_TF_FAILED  || 'false',
                error_type:     process.env.WF2_ERROR_TYPE || 'NONE',
                trigger_reason: process.env.TRIGGER_REASON || 'WF2',
              }
            });
            console.log('[WF2] WF4 triggered — action:', process.env.ACTION);

      - name: "Summary | Monitor Report"
        if: always()
        run: |
          echo "##[group]WF2 Monitor Summary"
          echo "────────────────────────────────────────────────"
          echo " WF2  Scheduled CIS Monitor"
          echo " Run  #${{ github.run_number }} | $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "────────────────────────────────────────────────"
          echo " CIS Benchmark"
          echo "   Rate       : ${{ env.CIS_RATE }}%"
          echo "   Pass       : ${{ env.CIS_PASS }}/29"
          echo "   Fail       : ${{ env.CIS_FAIL }}"
          echo "   Regression : ${{ env.REGRESSION }}"
          echo " Infrastructure"
          echo "   Drift      : ${{ env.DRIFT_DETECTED }}"
          echo "   IAM Anomaly: ${{ env.IAM_ANOMALY }}"
          echo " Action"
          echo "   Decision   : ${{ env.ACTION }}"
          echo "   Reason     : ${{ env.TRIGGER_REASON }}"
          echo "────────────────────────────────────────────────"
          echo "##[endgroup]"