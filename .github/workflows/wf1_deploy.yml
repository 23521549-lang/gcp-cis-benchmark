name: "WF1 — Initial Deploy & Bootstrap"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Chỉ plan, không apply"
        type: boolean
        default: false

env:
  PROJECT_ID:      project-3a51a40b-8c9e-4126-804
  TF_DIR:          terraform
  SCRIPTS_DIR:     scripts
  REGION:          asia-southeast1
  TF_STATE_BUCKET: tf-state-project-3a51a40b-8c9e-4126-804

jobs:
  deploy:
    name: "Deploy Infrastructure"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # ── Phase 0: Thu thập thông tin ────────────────────────────
      - name: "[Phase 0] Thu thập thông tin hệ thống"
        run: |
          chmod +x ${{ env.SCRIPTS_DIR }}/collect_info.sh
          REGION=${{ env.REGION }} \
            ${{ env.SCRIPTS_DIR }}/collect_info.sh /tmp
          echo "=== Context Info ==="
          cat /tmp/context_info.json

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -upgrade

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="allowed_client_cidr=${{ secrets.ALLOWED_CLIENT_CIDR }}" \
            -out=tfplan \
            -detailed-exitcode \
            -no-color 2>&1 | tee /tmp/tf_plan.txt
          echo "PLAN_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      # ── Terraform Apply — tiếp tục dù lỗi để phân loại ────────
      - name: Terraform Apply
        if: ${{ !inputs.dry_run }}
        working-directory: ${{ env.TF_DIR }}
        run: |
          set +e
          terraform apply -auto-approve tfplan 2>&1 | tee /tmp/tf_apply.txt
          APPLY_EXIT=$?
          set -e

          echo "APPLY_EXIT=$APPLY_EXIT" >> $GITHUB_ENV

          if [ $APPLY_EXIT -ne 0 ]; then
            echo "TF_FAILED=true" >> $GITHUB_ENV

            # Phân loại lỗi
            ERROR_TYPE="TF_UNKNOWN"
            if grep -qiE "already exists|conflict|409" /tmp/tf_apply.txt; then
              ERROR_TYPE="TF_CONFLICT"
            fi
            if grep -qiE "does not have access|permission denied|403|serviceAccountUser|PERMISSION_DENIED" /tmp/tf_apply.txt; then
              ERROR_TYPE="TF_PERMISSION"
            fi
            if grep -qiE "quota|RESOURCE_EXHAUSTED|429|rateLimitExceeded" /tmp/tf_apply.txt; then
              ERROR_TYPE="TF_QUOTA"
            fi
            if grep -qiE "timeout|deadline exceeded|context deadline" /tmp/tf_apply.txt; then
              ERROR_TYPE="TF_TIMEOUT"
            fi

            # Nếu vừa conflict vừa permission — ưu tiên permission
            if grep -qiE "already exists|conflict|409" /tmp/tf_apply.txt && \
               grep -qiE "serviceAccountUser|PERMISSION_DENIED" /tmp/tf_apply.txt; then
              ERROR_TYPE="TF_CONFLICT,TF_PERMISSION"
            fi

            echo "TF_ERROR_TYPE=$ERROR_TYPE" >> $GITHUB_ENV
            echo "⚠ Terraform Apply FAILED — Error type: $ERROR_TYPE"
            echo "--- Tail of apply log ---"
            tail -30 /tmp/tf_apply.txt
          else
            echo "TF_FAILED=false"     >> $GITHUB_ENV
            echo "TF_ERROR_TYPE=NONE"  >> $GITHUB_ENV
            echo "✓ Terraform Apply SUCCESS"
          fi
        continue-on-error: true

      - name: Wait for resources to stabilize
        run: sleep 30

      # ── CIS Full Check — chạy dù terraform lỗi ─────────────────
      - name: "CIS Full Check (29 controls)"
        id: cis_check
        run: |
          chmod +x ${{ env.SCRIPTS_DIR }}/cis_full_check.sh
          cd ${{ env.SCRIPTS_DIR }}

          set +e
          ./cis_full_check.sh json /tmp/cis_report.json /tmp/cis_baseline_latest.json \
            2>&1 | tee /tmp/cis_output.txt
          CIS_EXIT=$?
          set -e

          echo "CIS_EXIT=$CIS_EXIT" >> $GITHUB_ENV

          if [ -f /tmp/cis_report.json ]; then
            echo "CIS_PASS=$(jq '.total_pass'      /tmp/cis_report.json)" >> $GITHUB_ENV
            echo "CIS_FAIL=$(jq '.total_fail'      /tmp/cis_report.json)" >> $GITHUB_ENV
            echo "CIS_RATE=$(jq '.compliance_rate' /tmp/cis_report.json)" >> $GITHUB_ENV
          else
            echo "CIS_PASS=0"   >> $GITHUB_ENV
            echo "CIS_FAIL=99"  >> $GITHUB_ENV
            echo "CIS_RATE=0"   >> $GITHUB_ENV
          fi

      # ── Phase 1: Lưu baseline chỉ khi mọi thứ OK ───────────────
      - name: "[Phase 1] Lưu golden baseline"
        if: |
          env.CIS_EXIT == '0' &&
          env.TF_FAILED == 'false' &&
          !inputs.dry_run
        env:
          TF_STATE_BUCKET: ${{ env.TF_STATE_BUCKET }}
        run: |
          chmod +x ${{ env.SCRIPTS_DIR }}/baseline/init_baseline.sh
          ${{ env.SCRIPTS_DIR }}/baseline/init_baseline.sh \
            /tmp/cis_report.json WF1 /tmp/context_info.json
          echo "✓ Golden baseline saved"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cis-deploy-report-${{ github.run_number }}
          path: |
            /tmp/cis_report.json
            /tmp/tf_apply.txt
            /tmp/context_info.json
          retention-days: 30

      # ── Quyết định trigger WF4 ──────────────────────────────────
      - name: "Quyết định trigger WF4"
        if: always() && !inputs.dry_run
        run: |
          TRIGGER_WF4=false
          TRIGGER_REASON=""

          # Lỗi Terraform
          if [ "${{ env.TF_FAILED }}" = "true" ]; then
            TRIGGER_WF4=true
            TRIGGER_REASON="TF_ERROR:${{ env.TF_ERROR_TYPE }}"
          fi

          # CIS FAIL
          CIS_FAIL_COUNT="${{ env.CIS_FAIL }}"
          if [ -n "$CIS_FAIL_COUNT" ] && [ "$CIS_FAIL_COUNT" != "0" ]; then
            TRIGGER_WF4=true
            if [ -n "$TRIGGER_REASON" ]; then
              TRIGGER_REASON="${TRIGGER_REASON},CIS_FAIL:${CIS_FAIL_COUNT}"
            else
              TRIGGER_REASON="CIS_FAIL:${CIS_FAIL_COUNT}"
            fi
          fi

          echo "TRIGGER_WF4=$TRIGGER_WF4"       >> $GITHUB_ENV
          echo "TRIGGER_REASON=$TRIGGER_REASON" >> $GITHUB_ENV

          echo "================================"
          echo "  TRIGGER_WF4 : $TRIGGER_WF4"
          echo "  REASON      : $TRIGGER_REASON"
          echo "  TF_FAILED   : ${{ env.TF_FAILED }}"
          echo "  CIS_FAIL    : ${{ env.CIS_FAIL }}"
          echo "================================"

      - name: "Trigger WF4 Recovery"
        if: always() && env.TRIGGER_WF4 == 'true' && !inputs.dry_run
        uses: actions/github-script@v7
        with:
          script: |
            const reason    = process.env.TRIGGER_REASON  || 'UNKNOWN';
            const cisFail   = process.env.CIS_FAIL        || '0';
            const tfFailed  = process.env.TF_FAILED       || 'false';
            const errorType = process.env.TF_ERROR_TYPE   || 'NONE';

            console.log(`Triggering WF4 — reason: ${reason}`);

            await github.rest.actions.createWorkflowDispatch({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              workflow_id: 'wf4_recovery.yml',
              ref:         'main',
              inputs: {
                trigger:        'WF1',
                cis_fail_count: cisFail,
                tf_failed:      tfFailed,
                error_type:     errorType,
                trigger_reason: reason,
              }
            });
            console.log('WF4 dispatched successfully');

      - name: Summary
        if: always()
        run: |
          echo "================================================"
          echo "  WF1 Deploy Summary"
          echo "  TF_FAILED   : ${{ env.TF_FAILED }}"
          echo "  TF_ERROR    : ${{ env.TF_ERROR_TYPE }}"
          echo "  CIS PASS    : ${{ env.CIS_PASS }}"
          echo "  CIS FAIL    : ${{ env.CIS_FAIL }}"
          echo "  CIS RATE    : ${{ env.CIS_RATE }}%"
          echo "  WF4 TRIGGER : ${{ env.TRIGGER_WF4 }}"
          echo "  REASON      : ${{ env.TRIGGER_REASON }}"
          echo "================================================"