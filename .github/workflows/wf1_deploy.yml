name: "WF1 — Initial Deploy & Bootstrap"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Plan only, no apply"
        type: boolean
        default: false

env:
  PROJECT_ID:      project-3a51a40b-8c9e-4126-804
  TF_DIR:          terraform
  SCRIPTS_DIR:     scripts
  REGION:          asia-southeast1
  VM_ZONE:         asia-southeast1-a
  TF_STATE_BUCKET: tf-state-3a51a40b-8c9e-4126-804
  ALERT_EMAIL:     23521549@gm.uit.edu.vn

jobs:
  deploy:
    name: "Deploy Infrastructure"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: "Phase 0 | Collect System Information"
        run: |
          echo "##[group]Phase 0: System Information Collection"
          chmod +x ${{ env.SCRIPTS_DIR }}/collect_info.sh
          REGION=${{ env.REGION }} \
            ${{ env.SCRIPTS_DIR }}/collect_info.sh /tmp || true
          echo "##[endgroup]"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: "Terraform | Initialize"
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -upgrade

      - name: "Terraform | Validate Configuration"
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: "Terraform | Auto-unlock State Lock"
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "##[group]Terraform: State Lock Check"
          LOCK_FILE="gs://${{ env.TF_STATE_BUCKET }}/terraform/state/default.tflock"

          LOCK_EXISTS=$(gsutil stat "$LOCK_FILE" 2>/dev/null && echo "true" || echo "false")
          if [ "$LOCK_EXISTS" = "false" ]; then
            echo "INFO     No state lock detected"
            echo "##[endgroup]"
            exit 0
          fi

          LOCK_INFO=$(gsutil cat "$LOCK_FILE" 2>/dev/null || echo "{}")
          LOCK_CREATED=$(echo "$LOCK_INFO" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('Created',''))" 2>/dev/null || echo "")
          echo "WARN     State lock detected — Created: $LOCK_CREATED"

          AGE_MINUTES=999
          if [ -n "$LOCK_CREATED" ]; then
            LOCK_TS=$(date -d "$LOCK_CREATED" +%s 2>/dev/null || echo "0")
            NOW_TS=$(date +%s)
            [ "$LOCK_TS" -gt 0 ] && AGE_MINUTES=$(( (NOW_TS - LOCK_TS) / 60 ))
            echo "INFO     Lock age: ${AGE_MINUTES} minutes"
          fi

          if [ "$AGE_MINUTES" -gt 15 ]; then
            echo "INFO     Lock age exceeds 15 minutes — removing stale lock"
            gsutil rm "$LOCK_FILE" 2>/dev/null \
              && echo "OK       State lock removed" \
              || echo "##[warning]Failed to remove state lock"
          else
            echo "INFO     Lock is recent — waiting with -lock-timeout=120s"
          fi
          echo "##[endgroup]"
        continue-on-error: true

      - name: "Terraform | Auto-import Existing Resources"
        if: ${{ !inputs.dry_run }}
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "##[group]Terraform: Auto-import (prevent 409 conflict)"

          export TF_VAR_db_username="${{ secrets.DB_USERNAME }}"
          export TF_VAR_db_password="${{ secrets.DB_PASSWORD }}"
          export TF_VAR_allowed_client_cidr="${{ secrets.ALLOWED_CLIENT_CIDR }}"

          import_if_missing() {
            local resource="$1" gcp_id="$2" desc="$3"
            if terraform state show "$resource" &>/dev/null 2>&1; then
              echo "SKIP     $desc — already in state"
            else
              echo "RUN      Importing: $desc"
              terraform import "$resource" "$gcp_id" 2>&1 \
                && echo "OK       Imported: $desc" \
                || echo "##[warning]Import failed (may not exist yet): $desc"
            fi
          }

          PROJECT=${{ env.PROJECT_ID }}
          REGION=${{ env.REGION }}
          ZONE=${{ env.VM_ZONE }}

          import_if_missing "google_kms_key_ring.my_keyring" \
            "projects/${PROJECT}/locations/${REGION}/keyRings/benchmark-keyring" \
            "KMS KeyRing: benchmark-keyring"

          import_if_missing "google_kms_crypto_key.my_crypto_key" \
            "projects/${PROJECT}/locations/${REGION}/keyRings/benchmark-keyring/cryptoKeys/benchmark-crypto-key" \
            "KMS CryptoKey: benchmark-crypto-key"

          for BNAME in \
            "benchmark-storage-v2-${PROJECT}" \
            "benchmark-storage-${PROJECT}" \
            "benchmark-storage-3a51a40b-8c9e-4126-804" \
            "benchmark-storage-v2-3a51a40b-8c9e-4126-804"; do
            if gsutil ls "gs://${BNAME}" &>/dev/null 2>&1; then
              import_if_missing "google_storage_bucket.log_bucket" "$BNAME" \
                "Storage Bucket: $BNAME"
              break
            fi
          done

          API_KEY_ID=$(gcloud alpha services api-keys list \
            --project="$PROJECT" --format="value(name)" \
            --filter="displayName:Restricted" 2>/dev/null | head -1 || echo "")
          [ -n "$API_KEY_ID" ] && import_if_missing \
            "google_apikeys_key.restricted_api_key" "$API_KEY_ID" "API Key: restricted-app-key"

          SINK_EXISTS=$(gcloud logging sinks list \
            --project="$PROJECT" --filter="name=benchmark-log-sink" \
            --format="value(name)" 2>/dev/null || echo "")
          [ -n "$SINK_EXISTS" ] && import_if_missing \
            "google_logging_project_sink.log_sink" \
            "projects/${PROJECT}/sinks/benchmark-log-sink" "Log Sink: benchmark-log-sink"

          VM_EXISTS=$(gcloud compute instances describe benchmark-vm-01 \
            --zone="$ZONE" --project="$PROJECT" \
            --format="value(name)" 2>/dev/null || echo "")
          [ -n "$VM_EXISTS" ] && import_if_missing \
            "google_compute_instance.vm" \
            "projects/${PROJECT}/zones/${ZONE}/instances/benchmark-vm-01" "VM: benchmark-vm-01"

          echo "RUN      Verifying serviceAccountUser permission..."
          gcloud iam service-accounts add-iam-policy-binding \
            "app-least-privilege-sa@${PROJECT}.iam.gserviceaccount.com" \
            --member="serviceAccount:github-actions-sa@${PROJECT}.iam.gserviceaccount.com" \
            --role="roles/iam.serviceAccountUser" \
            --project="$PROJECT" --quiet 2>/dev/null \
            && echo "OK       serviceAccountUser permission verified" \
            || echo "INFO     serviceAccountUser already exists or not required"

          echo "INFO     Auto-import completed"
          echo "##[endgroup]"
        continue-on-error: true

      - name: "Terraform | Plan"
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "##[group]Terraform: Plan"
          set +e
          terraform plan \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="allowed_client_cidr=${{ secrets.ALLOWED_CLIENT_CIDR }}" \
            -lock-timeout=120s \
            -out=tfplan -no-color \
            2>&1 | tee /tmp/tf_plan.txt
          PLAN_EXIT=$?
          set -e

          echo "PLAN_EXIT=$PLAN_EXIT" >> $GITHUB_ENV
          if [ $PLAN_EXIT -ne 0 ]; then
            echo "TF_PLAN_FAILED=true" >> $GITHUB_ENV
            echo "##[error]Terraform plan failed (exit: $PLAN_EXIT)"
            tail -20 /tmp/tf_plan.txt
          else
            echo "TF_PLAN_FAILED=false" >> $GITHUB_ENV
            echo "OK       Terraform plan completed successfully"
          fi
          echo "##[endgroup]"

      - name: "Terraform | Apply"
        if: ${{ !inputs.dry_run && env.TF_PLAN_FAILED == 'false' }}
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "##[group]Terraform: Apply"
          set +e
          terraform apply -auto-approve -lock-timeout=120s \
            tfplan 2>&1 | tee /tmp/tf_apply.txt
          APPLY_EXIT=$?
          set -e

          if [ "$APPLY_EXIT" -ne 0 ]; then
            echo "TF_FAILED=true" >> $GITHUB_ENV
            ERROR_TYPE="TF_UNKNOWN"
            grep -qiE "already exists|conflict|409"              /tmp/tf_apply.txt && ERROR_TYPE="TF_CONFLICT"
            grep -qiE "serviceAccountUser|PERMISSION_DENIED|403" /tmp/tf_apply.txt \
              && ERROR_TYPE="${ERROR_TYPE},TF_PERMISSION"
            grep -qiE "quota|RESOURCE_EXHAUSTED|429"             /tmp/tf_apply.txt && ERROR_TYPE="TF_QUOTA"
            grep -qiE "timeout|deadline exceeded"                /tmp/tf_apply.txt && ERROR_TYPE="TF_TIMEOUT"
            grep -qiE "stale|state was changed"                  /tmp/tf_apply.txt && ERROR_TYPE="TF_STALE_PLAN"
            echo "TF_ERROR_TYPE=$ERROR_TYPE" >> $GITHUB_ENV
            echo "##[error]Terraform apply failed (exit: $APPLY_EXIT) — $ERROR_TYPE"
            tail -20 /tmp/tf_apply.txt
          else
            echo "TF_FAILED=false"    >> $GITHUB_ENV
            echo "TF_ERROR_TYPE=NONE" >> $GITHUB_ENV
            echo "OK       Terraform apply completed successfully"
          fi
          echo "##[endgroup]"
        continue-on-error: true

      - name: "Terraform | Skip Apply (Plan Failed)"
        if: ${{ !inputs.dry_run && env.TF_PLAN_FAILED == 'true' }}
        run: |
          echo "TF_FAILED=true"           >> $GITHUB_ENV
          echo "TF_ERROR_TYPE=TF_UNKNOWN" >> $GITHUB_ENV
          echo "##[warning]Plan failed — apply skipped"

      - name: "Wait | Resource Propagation (30s)"
        run: sleep 30

      - name: "CIS | Full Compliance Check (29 controls)"
        run: |
          echo "##[group]CIS Benchmark: Full Check — 29 Controls, 6 Domains"
          chmod +x ${{ env.SCRIPTS_DIR }}/cis_full_check.sh
          cd ${{ env.SCRIPTS_DIR }}
          set +e
          ./cis_full_check.sh json /tmp/cis_report.json /tmp/cis_baseline_latest.json \
            2>&1 | tee /tmp/cis_output.txt
          CIS_EXIT=$?
          set -e
          echo "CIS_EXIT=$CIS_EXIT" >> $GITHUB_ENV
          if [ -f /tmp/cis_report.json ]; then
            echo "CIS_PASS=$(jq '.total_pass'      /tmp/cis_report.json)" >> $GITHUB_ENV
            echo "CIS_FAIL=$(jq '.total_fail'      /tmp/cis_report.json)" >> $GITHUB_ENV
            echo "CIS_RATE=$(jq '.compliance_rate' /tmp/cis_report.json)" >> $GITHUB_ENV
          else
            echo "CIS_PASS=0"  >> $GITHUB_ENV
            echo "CIS_FAIL=99" >> $GITHUB_ENV
            echo "CIS_RATE=0"  >> $GITHUB_ENV
          fi
          echo "##[endgroup]"

      - name: "Phase 1 | Save Golden Baseline"
        if: env.CIS_EXIT == '0' && env.TF_FAILED != 'true' && !inputs.dry_run
        env:
          TF_STATE_BUCKET: ${{ env.TF_STATE_BUCKET }}
        run: |
          echo "##[group]Phase 1: Baseline Snapshot"
          chmod +x ${{ env.SCRIPTS_DIR }}/baseline/init_baseline.sh
          ${{ env.SCRIPTS_DIR }}/baseline/init_baseline.sh \
            /tmp/cis_report.json WF1 /tmp/context_info.json || true
          echo "##[endgroup]"

      - name: "Artifacts | Upload Reports"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wf1-deploy-report-${{ github.run_number }}
          path: |
            /tmp/cis_report.json
            /tmp/tf_apply.txt
            /tmp/context_info.json
          retention-days: 30

      - name: "WF4 | Evaluate Trigger Conditions"
        if: always() && !inputs.dry_run
        run: |
          echo "##[group]WF4 Trigger Evaluation"
          TRIGGER_WF4=false
          TRIGGER_REASON=""

          if [ "${{ env.TF_FAILED }}" = "true" ]; then
            TRIGGER_WF4=true
            TRIGGER_REASON="TF_ERROR:${{ env.TF_ERROR_TYPE }}"
          fi

          CIS_FAIL="${{ env.CIS_FAIL }}"
          if [ "${CIS_FAIL:-0}" -gt 0 ]; then
            TRIGGER_WF4=true
            TRIGGER_REASON="${TRIGGER_REASON:+$TRIGGER_REASON,}CIS_FAIL:${CIS_FAIL}"
          fi

          echo "TRIGGER_WF4=$TRIGGER_WF4"       >> $GITHUB_ENV
          echo "TRIGGER_REASON=$TRIGGER_REASON" >> $GITHUB_ENV

          echo "INFO     Trigger WF4 : $TRIGGER_WF4"
          echo "INFO     Reason      : ${TRIGGER_REASON:-none}"
          echo "INFO     TF Failed   : ${{ env.TF_FAILED }}"
          echo "INFO     CIS Fail    : ${{ env.CIS_FAIL }}"
          echo "##[endgroup]"

      - name: "WF4 | Trigger Recovery Pipeline"
        if: always() && env.TRIGGER_WF4 == 'true' && !inputs.dry_run
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              workflow_id: 'wf4_recovery.yml',
              ref:         'main',
              inputs: {
                trigger:        'WF1',
                cis_fail_count: process.env.CIS_FAIL      || '0',
                tf_failed:      process.env.TF_FAILED      || 'false',
                error_type:     process.env.TF_ERROR_TYPE  || 'NONE',
                trigger_reason: process.env.TRIGGER_REASON || 'WF1',
              }
            });
            console.log('[WF1] WF4 triggered — reason:', process.env.TRIGGER_REASON);

      - name: "Summary | Deployment Report"
        if: always()
        run: |
          echo "##[group]WF1 Deployment Summary"
          echo "────────────────────────────────────────────────"
          echo " WF1  Initial Deploy & Bootstrap"
          echo " Run  #${{ github.run_number }} | $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "────────────────────────────────────────────────"
          echo " Terraform"
          echo "   Status  : ${{ env.TF_FAILED == 'true' && 'FAILED' || 'SUCCESS' }}"
          echo "   Error   : ${{ env.TF_ERROR_TYPE }}"
          echo " CIS Benchmark"
          echo "   Pass    : ${{ env.CIS_PASS }}/29"
          echo "   Fail    : ${{ env.CIS_FAIL }}"
          echo "   Rate    : ${{ env.CIS_RATE }}%"
          echo " Recovery"
          echo "   WF4     : ${{ env.TRIGGER_WF4 }}"
          echo "   Reason  : ${{ env.TRIGGER_REASON }}"
          echo "────────────────────────────────────────────────"
          echo "##[endgroup]"