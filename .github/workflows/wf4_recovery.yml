name: "WF4 — Intelligent Recovery"

on:
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Trigger source (WF1/WF2/WF3/MANUAL)'
        type: string
        default: 'MANUAL'
      cis_fail_count:
        description: 'Số tiêu chuẩn FAIL'
        type: string
        default: '0'
      dry_run:
        description: 'Chỉ hiển thị plan, không thực thi'
        type: boolean
        default: false

env:
  PROJECT_ID: project-3a51a40b-8c9e-4126-804
  VM_NAME: benchmark-vm-01
  VM_ZONE: asia-southeast1-a
  REGION: asia-southeast1
  SCRIPTS_DIR: scripts
  ANSIBLE_DIR: ansible
  TF_STATE_BUCKET: tf-state-project-3a51a40b-8c9e-4126-804

jobs:
  recover:
    name: "Assess & Auto-recover CIS violations"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Install dependencies
        run: |
          pip install ansible google-auth 2>/dev/null || true
          ansible-galaxy collection install google.cloud 2>/dev/null || true

      - name: Log recovery trigger
        run: |
          echo "================================================================"
          echo "  WF4 RECOVERY STARTED"
          echo "  Trigger: ${{ inputs.trigger }}"
          echo "  CIS FAIL count: ${{ inputs.cis_fail_count }}"
          echo "  Dry run: ${{ inputs.dry_run }}"
          echo "  Time: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "================================================================"

      # ── Tải fail list từ artifact nếu có ──────────────────────
      - name: Tải control_fail_list nếu có
        run: |
          gsutil cp \
            gs://${{ env.TF_STATE_BUCKET }}/recovery/control_fail_list.json \
            /tmp/control_fail_list.json 2>/dev/null \
            && echo "FAIL_LIST_LOADED=true" >> $GITHUB_ENV \
            || echo "FAIL_LIST_LOADED=false" >> $GITHUB_ENV

      # ── Pre-recovery CIS check ─────────────────────────────────
      - name: "[Pre-check] CIS check trước recovery"
        run: |
          chmod +x ${{ env.SCRIPTS_DIR }}/cis_full_check.sh
          cd ${{ env.SCRIPTS_DIR }}
          ./cis_full_check.sh json /tmp/pre_recovery_report.json \
            2>&1 | tee /tmp/pre_check.txt || true
          echo "PRE_FAIL=$(jq '.total_fail' /tmp/pre_recovery_report.json 2>/dev/null || echo 99)" >> $GITHUB_ENV
          echo "PRE_PASS=$(jq '.total_pass' /tmp/pre_recovery_report.json 2>/dev/null || echo 0)"  >> $GITHUB_ENV
          # Dùng fail list từ pre-check nếu chưa có
          if [ "$FAIL_LIST_LOADED" = "false" ] && [ -f /tmp/control_fail_list.json ]; then
            echo "FAIL_LIST_LOADED=true" >> $GITHUB_ENV
          fi

      # ── Nhóm A + Domain 6: gcloud tự động ─────────────────────
      - name: "[Nhóm A] gcloud recovery (D1-D5 + D6 SQL)"
        id: group_a
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          VM_NAME: ${{ env.VM_NAME }}
          VM_ZONE: ${{ env.VM_ZONE }}
          REGION: ${{ env.REGION }}
          FAIL_LIST_FILE: /tmp/control_fail_list.json
        run: |
          chmod +x ${{ env.SCRIPTS_DIR }}/recovery.sh
          ${{ env.SCRIPTS_DIR }}/recovery.sh 2>&1 | tee /tmp/recovery_a_output.txt
          echo "RECOVERY_A_EXIT=${PIPESTATUS[0]}" >> $GITHUB_ENV

      # ── Nhóm B: Ansible CIS 4.1 + 4.2 ────────────────────────
      - name: "[Nhóm B] Ansible — VM Service Account (CIS 4.1+4.2)"
        id: group_b
        if: ${{ !inputs.dry_run }}
        run: |
          # Kiểm tra 4.1/4.2 có trong fail list không
          NEED_ANSIBLE=false
          if [ -f /tmp/control_fail_list.json ]; then
            jq -r '.[]' /tmp/control_fail_list.json 2>/dev/null | \
              grep -qE "^4\.[12]$" && NEED_ANSIBLE=true || true
          else
            NEED_ANSIBLE=true  # full mode
          fi

          if [ "$NEED_ANSIBLE" = "true" ]; then
            VM_IP=$(gcloud compute instances describe ${{ env.VM_NAME }} \
              --zone=${{ env.VM_ZONE }} \
              --project=${{ env.PROJECT_ID }} \
              --format="value(networkInterfaces[0].accessConfigs[0].natIP)" 2>/dev/null)

            if [ -n "$VM_IP" ]; then
              sed -i "s/benchmark-vm-01/benchmark-vm-01 ansible_host=$VM_IP/" \
                ${{ env.ANSIBLE_DIR }}/inventory.ini
              mkdir -p ~/.ssh
              echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/gcp_key
              chmod 600 ~/.ssh/gcp_key
              ansible-playbook \
                -i ${{ env.ANSIBLE_DIR }}/inventory.ini \
                ${{ env.ANSIBLE_DIR }}/fix_vm_sa.yml \
                --private-key=~/.ssh/gcp_key \
                -v 2>&1 | tee /tmp/ansible_output.txt || true
            else
              echo "Không lấy được VM IP — skip Ansible"
            fi
          else
            echo "CIS 4.1/4.2 không trong fail list — skip Ansible"
          fi

      # ── Wait: tăng lên 120s cho Cloud SQL ─────────────────────
      - name: Wait for changes to propagate (120s)
        run: sleep 120

      # ── Phase 4a: Lớp 1 — Script nội bộ ──────────────────────
      - name: "[Phase 4 — Layer 1] Post-recovery CIS check"
        run: |
          chmod +x ${{ env.SCRIPTS_DIR }}/cis_full_check.sh
          cd ${{ env.SCRIPTS_DIR }}
          ./cis_full_check.sh json /tmp/post_recovery_report.json \
            2>&1 | tee /tmp/post_check.txt || true
          echo "POST_FAIL=$(jq '.total_fail' /tmp/post_recovery_report.json 2>/dev/null || echo 99)" >> $GITHUB_ENV
          echo "POST_PASS=$(jq '.total_pass' /tmp/post_recovery_report.json 2>/dev/null || echo 0)"  >> $GITHUB_ENV
          echo "POST_RATE=$(jq '.compliance_rate' /tmp/post_recovery_report.json 2>/dev/null || echo 0)" >> $GITHUB_ENV

      # ── Phase 4b: Lớp 2 — GCP API trực tiếp ──────────────────
      - name: "[Phase 4 — Layer 2] GCP API direct verification"
        run: |
          L2_FAIL=0

          # Verify CIS 4.5 — serial port
          VM_SERIAL=$(gcloud compute instances describe ${{ env.VM_NAME }} \
            --zone=${{ env.VM_ZONE }} --project=${{ env.PROJECT_ID }} \
            --format="value(metadata.items[serial-port-enable])" 2>/dev/null || echo "")
          if [ "$VM_SERIAL" != "false" ] && [ "$VM_SERIAL" != "0" ]; then
            echo "L2_FAIL: CIS 4.5 serial port — GCP API value: '$VM_SERIAL'"
            L2_FAIL=$((L2_FAIL+1))
          fi

          # Verify CIS 5.1 — bucket public
          gsutil ls -p ${{ env.PROJECT_ID }} 2>/dev/null | while read B; do
            PUBLIC=$(gsutil iam get "$B" 2>/dev/null | grep -c "allUsers" || true)
            if [ "$PUBLIC" -gt 0 ]; then
              echo "L2_FAIL: CIS 5.1 bucket $B still public"
              L2_FAIL=$((L2_FAIL+1))
            fi
          done

          # Verify CIS 6.4 — SQL SSL
          SQL_INST=$(gcloud sql instances list \
            --project=${{ env.PROJECT_ID }} \
            --filter="databaseVersion~POSTGRES" \
            --format="value(name)" 2>/dev/null | head -1)
          if [ -n "$SQL_INST" ]; then
            SSL_VAL=$(gcloud sql instances describe "$SQL_INST" \
              --project=${{ env.PROJECT_ID }} \
              --format="value(settings.ipConfiguration.requireSsl)" 2>/dev/null)
            if [ "$SSL_VAL" != "True" ]; then
              echo "L2_FAIL: CIS 6.4 requireSsl — GCP API value: '$SSL_VAL'"
              L2_FAIL=$((L2_FAIL+1))
            fi
          fi

          echo "L2_FAIL=$L2_FAIL" >> $GITHUB_ENV
          if [ "$L2_FAIL" -eq 0 ]; then
            echo "✓ Layer 2 GCP API verification PASS"
          else
            echo "⚠ Layer 2 FAIL: $L2_FAIL — có thể false positive trong check script"
          fi

      # ── Phase 4c: Lớp 3 — Security Command Center ─────────────
      - name: "[Phase 4 — Layer 3] Security Command Center check"
        run: |
          # Kiểm tra SCC có enabled không
          SCC_ENABLED=$(gcloud services list --enabled \
            --project=${{ env.PROJECT_ID }} \
            --filter="config.name=securitycenter.googleapis.com" \
            --format="value(config.name)" 2>/dev/null)

          if [ -n "$SCC_ENABLED" ]; then
            # Query findings liên quan controls vừa fix
            # SCC cần org-level access — nếu chưa có org thì skip
            echo "[INFO] SCC enabled — query findings..."
            SCC_FINDINGS=$(gcloud scc findings list \
              --project=${{ env.PROJECT_ID }} \
              --filter="state=ACTIVE AND category=(SERIAL_PORT_ENABLED OR PUBLIC_BUCKET_ACL OR SQL_NO_ROOT_PASSWORD)" \
              --format="value(category)" 2>/dev/null || echo "")

            L3_FAIL=$(echo "$SCC_FINDINGS" | grep -c . 2>/dev/null || echo "0")
            echo "L3_FAIL=$L3_FAIL" >> $GITHUB_ENV
            if [ "$L3_FAIL" -eq 0 ]; then
              echo "✓ Layer 3 SCC: no active findings"
            else
              echo "⚠ Layer 3 SCC: $L3_FAIL active findings"
              echo "$SCC_FINDINGS"
            fi
          else
            echo "[INFO] SCC chưa enabled — skip Layer 3"
            echo "L3_FAIL=0" >> $GITHUB_ENV
          fi

      # ── Đánh giá tổng hợp 3 lớp ───────────────────────────────
      - name: "Đánh giá kết quả 3 lớp xác minh"
        run: |
          echo "================================================================"
          echo "  RECOVERY RESULT"
          echo "  PRE:  PASS=${{ env.PRE_PASS }}  FAIL=${{ env.PRE_FAIL }}"
          echo "  POST: PASS=${{ env.POST_PASS }} FAIL=${{ env.POST_FAIL }} Rate=${{ env.POST_RATE }}%"
          echo "  Layer 2 (GCP API): ${{ env.L2_FAIL }} issues"
          echo "  Layer 3 (SCC):     ${{ env.L3_FAIL }} findings"
          echo "================================================================"

          RECOVERY_STATUS="SUCCESS"
          if [ "${{ env.POST_FAIL }}" -gt 0 ]; then
            RECOVERY_STATUS="PARTIAL"
          fi
          if [ "${{ env.L2_FAIL }}" -gt 0 ] && [ "${{ env.POST_FAIL }}" -eq 0 ]; then
            RECOVERY_STATUS="FALSE_POSITIVE"
            echo "⚠ FALSE POSITIVE: Layer 1 PASS nhưng Layer 2 FAIL — bug trong check script"
          fi
          echo "RECOVERY_STATUS=$RECOVERY_STATUS" >> $GITHUB_ENV

      # ── Nhóm C: Email hướng dẫn nếu còn FAIL ─────────────────
      - name: "[Nhóm C] Manual actions guidance"
        if: env.POST_FAIL != '0' || env.RECOVERY_STATUS == 'FALSE_POSITIVE'
        run: |
          echo "================================================================"
          echo "  NHÓM C — Manual Actions Required"
          echo "================================================================"
          echo ""
          echo "  Recovery Status: ${{ env.RECOVERY_STATUS }}"
          echo "  Controls còn FAIL sau recovery: ${{ env.POST_FAIL }}"
          echo ""
          echo "  Các bước cần thực hiện thủ công:"
          echo "  1. CIS 1.6  — Xóa IAM binding serviceAccountUser ở project level"
          echo "  2. CIS 2.3  — Bật Retention Policy + Lock trên log bucket"
          echo "  3. CIS 2.4  — Verify Alert Policy cho Ownership Changes"
          echo "  4. CIS 3.3  — Bật DNSSEC trong vpc.tf → terraform apply"
          echo "  5. CIS 3.6  — Xóa SSH rule 0.0.0.0/0, chỉ cho phép IP cụ thể"
          echo ""
          echo "  Chi tiết: xem post_recovery_report.json artifact"
          echo ""
          # Trong production: gửi email tới ALERT_EMAIL

      - name: Upload recovery artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: recovery-report-${{ github.run_number }}
          path: |
            /tmp/pre_recovery_report.json
            /tmp/post_recovery_report.json
            /tmp/recovery_a_output.txt
            /tmp/post_check.txt
          retention-days: 30

      - name: Final summary
        if: always()
        run: |
          echo "================================================================"
          echo "  WF4 Recovery Summary"
          echo "  Trigger: ${{ inputs.trigger }}"
          echo "  PRE FAIL:  ${{ env.PRE_FAIL }}"
          echo "  POST FAIL: ${{ env.POST_FAIL }}"
          echo "  Rate:      ${{ env.POST_RATE }}%"
          echo "  Status:    ${{ env.RECOVERY_STATUS }}"
          echo "  L2 issues: ${{ env.L2_FAIL }}"
          echo "  L3 findings: ${{ env.L3_FAIL }}"
          echo "================================================================"
          [ "${{ env.RECOVERY_STATUS }}" = "SUCCESS" ] && exit 0 || exit 1