name: "WF4 — Intelligent Recovery"

on:
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Trigger source (WF1/WF2/WF3/MANUAL)'
        type: string
        default: 'MANUAL'
      cis_fail_count:
        description: 'Number of failed CIS controls'
        type: string
        default: '0'
      tf_failed:
        description: 'Terraform failure flag (true/false)'
        type: string
        default: 'false'
      error_type:
        description: 'Terraform error type'
        type: string
        default: 'NONE'
      trigger_reason:
        description: 'Detailed trigger reason'
        type: string
        default: ''
      dry_run:
        description: 'Simulate only, no changes applied'
        type: boolean
        default: false

env:
  PROJECT_ID:      project-3a51a40b-8c9e-4126-804
  VM_NAME:         benchmark-vm-01
  VM_ZONE:         asia-southeast1-a
  REGION:          asia-southeast1
  SCRIPTS_DIR:     scripts
  ANSIBLE_DIR:     ansible
  TF_STATE_BUCKET: tf-state-3a51a40b-8c9e-4126-804
  ALERT_EMAIL:     23521549@gm.uit.edu.vn

jobs:
  recover:
    name: "Intelligent Recovery"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: "Setup | Install Dependencies"
        run: |
          pip install ansible google-auth 2>/dev/null || true
          ansible-galaxy collection install google.cloud 2>/dev/null || true
          chmod +x ${{ env.SCRIPTS_DIR }}/recovery/*.sh \
                   ${{ env.SCRIPTS_DIR }}/cis_full_check.sh \
                   ${{ env.SCRIPTS_DIR }}/collect_info.sh 2>/dev/null || true

      - name: "Recovery | Session Started"
        run: |
          echo "##[group]WF4: Recovery Session Initiated"
          echo "────────────────────────────────────────────────"
          echo " WF4  Intelligent Recovery"
          echo " Run  #${{ github.run_number }} | $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "────────────────────────────────────────────────"
          echo " Trigger  : ${{ inputs.trigger }}"
          echo " Reason   : ${{ inputs.trigger_reason }}"
          echo " CIS Fail : ${{ inputs.cis_fail_count }}"
          echo " TF Error : ${{ inputs.tf_failed }} (${{ inputs.error_type }})"
          echo " Dry Run  : ${{ inputs.dry_run }}"
          echo "────────────────────────────────────────────────"
          echo "##[endgroup]"
          echo "WF4_START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: "Setup | Reset Recovery Loop Counter"
        run: |
          echo "0" | gsutil cp - \
            gs://${{ env.TF_STATE_BUCKET }}/recovery/loop_counter.txt \
            2>/dev/null \
            && echo "OK       Loop counter reset to 0" \
            || echo "##[warning]Failed to reset loop counter"
        continue-on-error: true

      - name: "Group G | Critical Checks — Loop & State Integrity"
        id: group_g
        run: |
          echo "##[group]Group G: Critical Checks"
          L1_FAIL="${{ inputs.cis_fail_count }}"
          L2_FAIL=0
          L3_FAIL=0
          L1_FAIL=$L1_FAIL \
          L2_FAIL=$L2_FAIL \
          L3_FAIL=$L3_FAIL \
          TF_STATE_BUCKET=${{ env.TF_STATE_BUCKET }} \
            ${{ env.SCRIPTS_DIR }}/recovery/group_g.sh 2>&1
          echo "GROUP_G_EXIT=$?" >> $GITHUB_ENV
          echo "##[endgroup]"
        continue-on-error: true

      - name: "Guard | Abort on Recovery Loop Detected"
        if: env.G_LOOP_BLOCKED == 'true'
        run: |
          echo "##[error]Recovery loop detected — aborting to prevent infinite loop"
          echo "INFO     Review previous recovery logs and fix manually"
          echo "INFO     Reset counter: echo '0' | gsutil cp - gs://${{ env.TF_STATE_BUCKET }}/recovery/loop_counter.txt"
          exit 1

      - name: "Group F | Pipeline Error Recovery"
        run: |
          echo "##[group]Group F: Pipeline Error Recovery"
          TF_STATE_BUCKET=${{ env.TF_STATE_BUCKET }} \
          VM_NAME=${{ env.VM_NAME }} \
          VM_ZONE=${{ env.VM_ZONE }} \
          ANSIBLE_FAILED=false \
            ${{ env.SCRIPTS_DIR }}/recovery/group_f.sh 2>&1
          echo "##[endgroup]"
        continue-on-error: true

      - name: "Pre-Check | CIS Compliance Baseline"
        run: |
          echo "##[group]Pre-Check: CIS Compliance Before Remediation"
          cd ${{ env.SCRIPTS_DIR }}
          set +e
          ./cis_full_check.sh json /tmp/pre_recovery_report.json \
            2>&1 | tee /tmp/pre_check.txt
          set -e
          echo "PRE_FAIL=$(jq '.total_fail' /tmp/pre_recovery_report.json 2>/dev/null || echo 99)" >> $GITHUB_ENV
          echo "PRE_PASS=$(jq '.total_pass' /tmp/pre_recovery_report.json 2>/dev/null || echo 0)"  >> $GITHUB_ENV
          if [ -f /tmp/control_fail_list.json ]; then
            gsutil cp /tmp/control_fail_list.json \
              gs://${{ env.TF_STATE_BUCKET }}/recovery/control_fail_list.json \
              2>/dev/null || true
          fi
          echo "##[endgroup]"

      - name: "Group D | Infrastructure Error Recovery"
        if: inputs.tf_failed == 'true'
        run: |
          echo "##[group]Group D: Infrastructure Error Recovery"
          ERROR_TYPE="${{ inputs.error_type }}" \
          APPLY_LOG=/tmp/tf_apply.txt \
            ${{ env.SCRIPTS_DIR }}/recovery/group_d.sh 2>&1
          echo "##[endgroup]"
        continue-on-error: true

      - name: "Group E | Security Anomaly Recovery"
        run: |
          echo "##[group]Group E: Security Anomaly Recovery"
          gsutil cp \
            gs://${{ env.TF_STATE_BUCKET }}/baseline/iam_baseline_latest.json \
            /tmp/iam_baseline_latest.json 2>/dev/null || true

          REGION=${{ env.REGION }} \
            ${{ env.SCRIPTS_DIR }}/collect_info.sh /tmp 2>/dev/null || true

          IAM_ANOMALY=false \
          DRIFT_DETECTED=false \
          IAM_BASELINE=/tmp/iam_baseline_latest.json \
          IAM_CURRENT=/tmp/iam_snapshot.json \
          DB_USERNAME=${{ secrets.DB_USERNAME }} \
          DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
          ALLOWED_CLIENT_CIDR=${{ secrets.ALLOWED_CLIENT_CIDR }} \
            ${{ env.SCRIPTS_DIR }}/recovery/group_e.sh 2>&1
          echo "##[endgroup]"
        continue-on-error: true

      - name: "Setup | Load Fail List from GCS"
        run: |
          gsutil cp \
            gs://${{ env.TF_STATE_BUCKET }}/recovery/control_fail_list.json \
            /tmp/control_fail_list.json 2>/dev/null \
            && { echo "OK       Fail list loaded from GCS"; \
                 echo "FAIL_LIST_LOADED=true" >> $GITHUB_ENV; } \
            || { echo "INFO     No fail list in GCS — running full remediation"; \
                 echo "FAIL_LIST_LOADED=false" >> $GITHUB_ENV; }

      - name: "Group A | gcloud Auto-Remediation (D1–D6)"
        run: |
          echo "##[group]Group A: gcloud Auto-Remediation"
          DRY_RUN="${{ inputs.dry_run }}" \
          VM_NAME=${{ env.VM_NAME }} \
          VM_ZONE=${{ env.VM_ZONE }} \
          REGION=${{ env.REGION }} \
          FAIL_LIST_FILE=/tmp/control_fail_list.json \
            ${{ env.SCRIPTS_DIR }}/recovery/group_a.sh \
            2>&1 | tee /tmp/recovery_a_output.txt
          echo "##[endgroup]"
        continue-on-error: true

      - name: "Group B | Ansible VM Service Account (CIS 4.1+4.2)"
        if: ${{ !inputs.dry_run }}
        run: |
          echo "##[group]Group B: Ansible VM Service Account Remediation"
          VM_NAME=${{ env.VM_NAME }} \
          VM_ZONE=${{ env.VM_ZONE }} \
          FAIL_LIST_FILE=/tmp/control_fail_list.json \
          SSH_KEY_FILE=/tmp/gcp_key \
            ${{ env.SCRIPTS_DIR }}/recovery/group_b.sh 2>&1 | tee /tmp/recovery_b_output.txt
          echo "##[endgroup]"
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
        continue-on-error: true

      - name: "Wait | GCP Resource Propagation (120s)"
        run: sleep 120

      - name: "Verify L1 | Post-Remediation CIS Check"
        run: |
          echo "##[group]Verification Layer 1: CIS Script Check"
          cd ${{ env.SCRIPTS_DIR }}
          set +e
          ./cis_full_check.sh json /tmp/post_recovery_report.json \
            2>&1 | tee /tmp/post_check.txt
          set -e
          echo "POST_FAIL=$(jq '.total_fail'      /tmp/post_recovery_report.json 2>/dev/null || echo 99)" >> $GITHUB_ENV
          echo "POST_PASS=$(jq '.total_pass'      /tmp/post_recovery_report.json 2>/dev/null || echo 0)"  >> $GITHUB_ENV
          echo "POST_RATE=$(jq '.compliance_rate' /tmp/post_recovery_report.json 2>/dev/null || echo 0)"  >> $GITHUB_ENV
          echo "##[endgroup]"

      - name: "Verify L2 | GCP API Direct Verification"
        run: |
          echo "##[group]Verification Layer 2: GCP API Direct Check"
          L2_FAIL=0

          while IFS= read -r line; do
            VM_I=$(echo "$line" | cut -f1)
            Z_I=$(echo "$line"  | cut -f2)
            [ -z "$VM_I" ] && continue
            SERIAL=$(gcloud compute instances describe "$VM_I" \
              --zone="$Z_I" --project=${{ env.PROJECT_ID }} \
              --format="value(metadata.items[serial-port-enable])" \
              2>/dev/null || echo "false")
            if echo "$SERIAL" | grep -qiE "^true$|^1$"; then
              echo "FAIL     CIS-4.5  Serial port still enabled: vm=$VM_I value=$SERIAL"
              L2_FAIL=$((L2_FAIL+1))
            fi
          done < <(gcloud compute instances list \
            --project=${{ env.PROJECT_ID }} \
            --format="value(name,zone)" 2>/dev/null)

          while IFS= read -r B; do
            [ -z "$B" ] && continue
            PUBLIC=$(gsutil iam get "$B" 2>/dev/null | \
              grep -c "allUsers\|allAuthenticatedUsers" || echo "0")
            if [ "${PUBLIC:-0}" -gt 0 ]; then
              echo "FAIL     CIS-5.1  Bucket still public: $B"
              L2_FAIL=$((L2_FAIL+1))
            fi
          done < <(gsutil ls -p ${{ env.PROJECT_ID }} 2>/dev/null)

          SQL_INST=$(gcloud sql instances list \
            --project=${{ env.PROJECT_ID }} \
            --filter="databaseVersion~POSTGRES" \
            --format="value(name)" 2>/dev/null | head -1 || echo "")
          if [ -n "$SQL_INST" ]; then
            SSL_VAL=$(gcloud sql instances describe "$SQL_INST" \
              --project=${{ env.PROJECT_ID }} \
              --format="value(settings.ipConfiguration.requireSsl)" \
              2>/dev/null || echo "")
            if [ "$SSL_VAL" != "True" ]; then
              echo "FAIL     CIS-6.4  requireSsl not enabled: instance=$SQL_INST value=$SSL_VAL"
              L2_FAIL=$((L2_FAIL+1))
            fi
          fi

          SINK_OK=$(gcloud logging sinks list \
            --project=${{ env.PROJECT_ID }} \
            --filter="name=benchmark-log-sink" \
            --format="value(name)" 2>/dev/null || echo "")
          if [ -z "$SINK_OK" ]; then
            echo "FAIL     CIS-2.2  Log sink not found: benchmark-log-sink"
            L2_FAIL=$((L2_FAIL+1))
          fi

          echo "L2_FAIL=$L2_FAIL" >> $GITHUB_ENV
          [ "$L2_FAIL" -eq 0 ] \
            && echo "OK       Layer 2 GCP API verification passed" \
            || echo "##[warning]Layer 2 detected $L2_FAIL issue(s)"
          echo "##[endgroup]"

      - name: "Verify L3 | Security Command Center"
        run: |
          echo "##[group]Verification Layer 3: Security Command Center"
          SCC_ENABLED=$(gcloud services list --enabled \
            --project=${{ env.PROJECT_ID }} \
            --filter="config.name=securitycenter.googleapis.com" \
            --format="value(config.name)" 2>/dev/null || echo "")
          L3_FAIL=0
          if [ -n "$SCC_ENABLED" ]; then
            set +e
            L3_FAIL=$(gcloud scc findings list \
              --project=${{ env.PROJECT_ID }} \
              --filter="state=ACTIVE AND severity=HIGH" \
              --format="value(category)" 2>/dev/null | grep -c . || echo 0)
            set -e
            [ "$L3_FAIL" -eq 0 ] \
              && echo "OK       No HIGH severity findings in SCC" \
              || echo "##[warning]SCC detected $L3_FAIL HIGH severity finding(s)"
          else
            echo "INFO     SCC not enabled — Layer 3 skipped"
          fi
          echo "L3_FAIL=$L3_FAIL" >> $GITHUB_ENV
          echo "##[endgroup]"

      - name: "Analysis | Evaluate 3-Layer Verification Results"
        run: |
          echo "##[group]Analysis: 3-Layer Verification Results"
          POST_FAIL="${{ env.POST_FAIL }}"
          PRE_FAIL="${{ env.PRE_FAIL }}"
          L2_FAIL="${{ env.L2_FAIL }}"

          RECOVERY_STATUS="SUCCESS"
          [ "${POST_FAIL:-99}" -gt 0 ] && RECOVERY_STATUS="PARTIAL"
          [ "${L2_FAIL:-0}" -gt 0 ] && [ "${POST_FAIL:-99}" -eq 0 ] && RECOVERY_STATUS="FALSE_POSITIVE"
          [ "${POST_FAIL:-99}" -ge "${PRE_FAIL:-99}" ] && [ "${PRE_FAIL:-0}" -gt 0 ] && RECOVERY_STATUS="FAILED"

          echo "RECOVERY_STATUS=$RECOVERY_STATUS" >> $GITHUB_ENV

          L1_FAIL=$POST_FAIL \
          L2_FAIL=$L2_FAIL \
          L3_FAIL="${{ env.L3_FAIL }}" \
          TF_STATE_BUCKET=${{ env.TF_STATE_BUCKET }} \
            ${{ env.SCRIPTS_DIR }}/recovery/group_g.sh 2>/dev/null || true

          echo "INFO     Pre-remediation  : $PRE_FAIL failed"
          echo "INFO     Post-remediation : $POST_FAIL failed"
          echo "INFO     Compliance rate  : ${{ env.POST_RATE }}%"
          echo "INFO     Layer 2 issues   : $L2_FAIL"
          echo "INFO     Layer 3 findings : ${{ env.L3_FAIL }}"
          echo "INFO     Recovery status  : $RECOVERY_STATUS"
          echo "##[endgroup]"

      - name: "Group C | Manual Action Guidance"
        if: env.POST_FAIL != '0'
        run: |
          echo "##[group]Group C: Manual Action Guidance"
          FAIL_LIST_FILE=/tmp/control_fail_list.json \
          ALERT_EMAIL=${{ env.ALERT_EMAIL }} \
          ALLOWED_CLIENT_CIDR=${{ secrets.ALLOWED_CLIENT_CIDR }} \
            ${{ env.SCRIPTS_DIR }}/recovery/group_c.sh 2>&1
          echo "##[endgroup]"
        continue-on-error: true

      - name: "Group H | SLA & Compliance Trend Analysis"
        run: |
          echo "##[group]Group H: SLA & Compliance Trend Analysis"
          WF4_START_TIME=${{ env.WF4_START_TIME }} \
          TF_STATE_BUCKET=${{ env.TF_STATE_BUCKET }} \
            ${{ env.SCRIPTS_DIR }}/recovery/group_h.sh 2>&1
          echo "##[endgroup]"
        continue-on-error: true

      - name: "Notify | Send Recovery Report"
        if: always()
        run: |
          echo "##[group]Notify: Send Recovery Report"
          TF_FAILED="${{ inputs.tf_failed }}"           \
          ERROR_TYPE="${{ inputs.error_type }}"          \
          PRE_FAIL="${{ env.PRE_FAIL }}"                 \
          POST_FAIL="${{ env.POST_FAIL }}"               \
          POST_RATE="${{ env.POST_RATE }}"               \
          RECOVERY_STATUS="${{ env.RECOVERY_STATUS }}"   \
          L2_FAIL="${{ env.L2_FAIL }}"                   \
          L3_FAIL="${{ env.L3_FAIL }}"                   \
          D_ACTION="${{ env.D_ACTION }}"                 \
          D_FIXED="${{ env.D_FIXED }}"                   \
          E_FIXED="${{ env.E_FIXED }}"                   \
          F_FIXED="${{ env.F_FIXED }}"                   \
          G_CRITICAL="${{ env.G_CRITICAL }}"             \
          G_LOOP_BLOCKED="${{ env.G_LOOP_BLOCKED }}"     \
          G_FALSE_POSITIVE="${{ env.G_FALSE_POSITIVE }}" \
          SLA_BREACHED="${{ env.SLA_BREACHED }}"         \
          WF4_START_TIME="${{ env.WF4_START_TIME }}"     \
          TRIGGER="${{ inputs.trigger }}"                \
          TRIGGER_REASON="${{ inputs.trigger_reason }}"  \
          REPO="${{ github.repository }}"                \
          RUN_ID="${{ github.run_id }}"                  \
          ALERT_EMAIL="${{ env.ALERT_EMAIL }}"           \
          TF_STATE_BUCKET="${{ env.TF_STATE_BUCKET }}"   \
          GMAIL_USER="${{ secrets.GMAIL_USER }}"         \
          GMAIL_PASS="${{ secrets.GMAIL_APP_PASSWORD }}" \
            ${{ env.SCRIPTS_DIR }}/recovery/notify.sh 2>&1
          echo "##[endgroup]"

      - name: "Setup | Load Notify Result"
        if: always()
        run: |
          [ -f /tmp/notify_result.txt ] && \
            cat /tmp/notify_result.txt >> $GITHUB_ENV || true

      - name: "Artifacts | Upload Recovery Reports"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wf4-recovery-report-${{ github.run_number }}
          path: |
            /tmp/pre_recovery_report.json
            /tmp/post_recovery_report.json
            /tmp/recovery_a_output.txt
            /tmp/recovery_b_output.txt
            /tmp/post_check.txt
            /tmp/notify_email.txt
          retention-days: 30

      - name: "Summary | Recovery Report"
        if: always()
        run: |
          echo "##[group]WF4 Recovery Summary"
          echo "────────────────────────────────────────────────"
          echo " WF4  Intelligent Recovery"
          echo " Run  #${{ github.run_number }} | $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "────────────────────────────────────────────────"
          echo " Trigger"
          echo "   Source   : ${{ inputs.trigger }}"
          echo "   Reason   : ${{ inputs.trigger_reason }}"
          echo " CIS Compliance"
          echo "   Before   : ${{ env.PRE_FAIL }} failed"
          echo "   After    : ${{ env.POST_FAIL }} failed (${{ env.POST_RATE }}%)"
          echo "   Status   : ${{ env.RECOVERY_STATUS }}"
          echo " Verification"
          echo "   Layer 2  : ${{ env.L2_FAIL }} issue(s)"
          echo "   Layer 3  : ${{ env.L3_FAIL }} finding(s)"
          echo "────────────────────────────────────────────────"
          echo "##[endgroup]"

      - name: "Final | Exit Status"
        if: always()
        run: |
          [ -f /tmp/notify_result.txt ] && \
            source /tmp/notify_result.txt 2>/dev/null || true
          STATUS="${RECOVERY_STATUS:-UNKNOWN}"
          SEV="${SEVERITY:-UNKNOWN}"
          echo "INFO     Final status  : $STATUS"
          echo "INFO     Severity      : $SEV"
          [ "$STATUS" = "SUCCESS" ] && exit 0 || exit 1